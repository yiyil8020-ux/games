<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小区风云 - 社交推理游戏</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0d6c8;font-family:'Microsoft YaHei','Segoe UI',sans-serif;min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.screen{display:none;flex:1}.screen.active{display:flex}
#title-screen{flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460)}
#title-screen h1{font-size:3em;color:#c8a951;text-shadow:0 0 30px rgba(200,169,81,.4);margin-bottom:16px;letter-spacing:6px}
.subtitle{font-size:1.05em;color:#9a9a9a;max-width:520px;text-align:center;line-height:1.9;margin-bottom:32px}
.btn{background:linear-gradient(135deg,#c8a951,#b8942e);color:#1a1a2e;border:none;padding:12px 28px;font-size:1em;border-radius:6px;cursor:pointer;margin:6px;transition:.25s;font-weight:700}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(200,169,81,.35)}
.btn-danger{background:linear-gradient(135deg,#e94560,#c73e54);color:#fff}
.btn-small{padding:8px 16px;font-size:.85em}
.btn-outline{background:0 0;border:2px solid #c8a951;color:#c8a951}
.btn-outline:hover{background:#c8a951;color:#1a1a2e}
#game-screen{flex-direction:row}
#sidebar{width:280px;background:#16213e;padding:16px;border-right:1px solid #0f3460;overflow-y:auto;flex-shrink:0}
#main-area{flex:1;padding:20px;overflow-y:auto}
.panel{background:#16213e;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #0f3460}
.panel h3{color:#c8a951;margin-bottom:8px;font-size:.95em;border-bottom:1px solid #0f3460;padding-bottom:6px}
.npc-item,.loc-item{padding:10px;margin:3px 0;border-radius:6px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px}
.npc-item:hover,.loc-item:hover{background:#0f3460}
.avatar,.icon{font-size:1.4em}
.clue-card{background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;padding:10px;margin:5px 0;cursor:default;transition:.2s}
.clue-card.physical{border-left:3px solid #4ecdc4}
.clue-card.dialogue{border-left:3px solid #ffe66d}
.clue-card.cross{border-left:3px solid #e94560}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center}
.overlay.active{display:flex}
.overlay-box{background:#16213e;border-radius:12px;padding:24px;max-width:720px;width:92%;max-height:82vh;overflow-y:auto;border:1px solid #0f3460}
.dialogue-text{font-size:1.05em;line-height:1.85;margin-bottom:18px;padding:14px;background:#1a1a2e;border-radius:8px;border-left:3px solid #c8a951}
.dialogue-speaker{color:#c8a951;font-weight:700;margin-bottom:6px;font-size:1.15em}
.dialogue-opts{display:flex;flex-direction:column;gap:6px}
.dialogue-opt{background:#1a1a2e;border:1px solid #0f3460;padding:11px;border-radius:6px;cursor:pointer;transition:.2s;text-align:left}
.dialogue-opt:hover{border-color:#c8a951;background:#0f3460}
.accuse-card{background:#1a1a2e;border:2px solid #0f3460;border-radius:8px;padding:14px;margin:6px 0;cursor:pointer;transition:.3s;text-align:center}
.accuse-card:hover{border-color:#e94560}
.accuse-card.selected{border-color:#e94560;box-shadow:0 0 14px rgba(233,69,96,.3)}
.ending-title{font-size:1.9em;color:#c8a951;margin-bottom:18px}
.ending-text{font-size:1.05em;line-height:2;text-align:center;padding:10px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#c8a951;color:#1a1a2e;padding:11px 22px;border-radius:8px;font-weight:700;z-index:200;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.new-clue{animation:pulse .5s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.board-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.board-chip{background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:.82em;transition:.2s;max-width:180px}
.board-chip.sel{border-color:#c8a951;box-shadow:0 0 8px rgba(200,169,81,.4)}
hr.sep{border:none;border-top:1px solid #0f3460;margin:10px 0}
</style>
</head>
<body>
<div id="app">
<div id="title-screen" class="screen active">
<h1>小区风云</h1>
<p class="subtitle">阳光花园小区，物业经理老王突然跑路，30万维修基金不翼而飞。你是新任业委会成员，有<b>7天</b>时间查明真相。</p>
<button class="btn" onclick="startGame()">开始调查</button>
<button class="btn btn-outline" onclick="loadGame()">继续游戏</button>
</div>
<div id="game-screen" class="screen">
<div id="sidebar">
<div class="panel"><h3>调查进度</h3>
<div>第 <span id="dayDisp">1</span> 天 / 7 &nbsp; <span class="time-badge" id="actDisp">行动 3</span></div>
<div style="margin-top:6px">已收集线索：<span id="clueCnt">0</span></div></div>
<div class="panel"><h3>小区居民</h3><div id="npcList"></div></div>
<div class="panel"><h3>调查地点</h3><div id="locList"></div></div>
<div class="panel"><h3>操作</h3>
<button class="btn btn-small" onclick="showClues()">线索背包</button>
<button class="btn btn-small" onclick="showBoard()">推理板</button>
<button class="btn btn-small btn-outline" onclick="saveGame()">存档</button>
<button class="btn btn-small btn-danger" onclick="makeAccusation()">指认凶手</button>
</div></div>
<div id="main-area"><div id="content" class="panel">
<h3>欢迎来到阳光花园小区</h3>
<p>选择一个地点开始调查，或找居民聊聊。每天你有<b>3次行动</b>机会。</p>
<p style="margin-top:8px;color:#9a9a9a">提示：先和居民打好关系，再深入调查关键地点。</p>
</div></div></div></div>
<div id="overlay" class="overlay"><div class="overlay-box" id="overlayBox"></div></div>

: "c152", "name": "赵老师压力大", "desc": "刘阿姨：赵老师最近瘦了很多，经常自言自语。", "type": "对话", "npc": "刘阿姨", "day": 2, "cat": "人物"}, {"id": "c153", "name": "确认老王全名", "desc": "李姐确认王德明就是老王的全名。", "type": "对话", "npc": "李姐", "day": 3, "cat": "人物"}, {"id": "c154", "name": "签字被冒用", "desc": "高好感时赵老师承认两份审计报告签字不是他签的——有人模仿笔迹。", "type": "对话", "npc": "赵老师", "day": 3, "cat": "财务"}, {"id": "c155", "name": "删监控真相", "desc": "好感满时张工坦白：凌晨1点接电话被叫去删录像，但偷偷保留加密备份。", "type": "对话", "npc": "张工程师", "day": 3, "cat": "核心"}, {"id": "c156", "name": "刘阿姨的香水", "desc": "刘阿姨：她一直用某品牌香水，天台望远镜擦拭布上可能有她的痕迹。", "type": "对话", "npc": "刘阿姨", "day": 3, "cat": "物证"}, {"id": "c157", "name": "李姐承认帮藏账本", "desc": "高好感+铁证：李姐承认老王让她保管账本，说'以防万一'。", "type": "对话", "npc": "李姐", "day": 3, "cat": "物证"}, {"id": "c158", "name": "赵老师保险柜内容", "desc": "高好感时赵老师打开保险柜：里面是完整的审计证据副本。", "type": "对话", "npc": "赵老师", "day": 3, "cat": "财务"}, {"id": "c159", "name": "小陈床下现金来源", "desc": "小陈说3万是送外卖攒的(实际是10万分红的一部分)。", "type": "对话", "npc": "小陈", "day": 3, "cat": "财务", "isLie": true}, {"id": "c160", "name": "张工的真实工作", "desc": "张工除了自由职业外，还是某安全咨询公司的兼职人员，该公司与周建国有业务往来。", "type": "对话", "npc": "张工程师", "day": 3, "cat": "人物"}, {"id": "c161", "name": "刘阿姨看到了运东西", "desc": "案发当晚刘阿姨确实看到有人用推车往地下车库运箱子。", "type": "对话", "npc": "刘阿姨", "day": 2, "cat": "目击"}, {"id": "c162", "name": "李姐和周建国的交易", "desc": "极高好感：李姐承认认识周建国，他常来买东西，偶尔让她帮忙。", "type": "对话", "npc": "李姐", "day": 3, "cat": "人物"}, {"id": "c163", "name": "赵老师知道老王在哪", "desc": "赵老师暗示他可能知道老王去了哪里，但不敢说。", "type": "对话", "npc": "赵老师", "day": 3, "cat": "人物"}, {"id": "c164", "name": "张工知道更多人", "desc": "张工暗示雇他的人不只是周建国，还有'更上面的人'。", "type": "对话", "npc": "张工程师", "day": 3, "cat": "人物"}, {"id": "c165", "name": "小陈的愧疚", "desc": "小陈最后承认自己很后悔，他本来以为只是帮忙看门。", "type": "对话", "npc": "小陈", "day": 3, "cat": "人物"}, {"id": "c201", "name": "老王是替罪羊", "desc": "综合电话录音+合影+陈小军身份：老王被老同学周建国拉下水，事后被推出来背锅。", "type": "交叉", "requires": ["c051", "c073", "c072"], "cat": "核心"}, {"id": "c202", "name": "完整资金链", "desc": "综合存折+银行流水+三个收款人：30万从基金→恒达→三人平分(周建国、老王、小陈各10万)。", "type": "交叉", "requires": ["c024", "c070", "c071"], "cat": "财务"}, {"id": "c203", "name": "监控删除真凶", "desc": "综合电脑日志+钥匙记录+加密硬盘：张工亲自删了监控但保留了备份。", "type": "交叉", "requires": ["c018", "c049", "c037"], "cat": "监控"}, {"id": "c204", "name": "假合同假验收", "desc": "综合两份合同+验收报告：三份文件形成完整虚假工程链。", "type": "交叉", "requires": ["c004", "c005", "c030"], "cat": "财务"}, {"id": "c205", "name": "李姐是知情保管者", "desc": "综合包裹+短信+碎纸机购买：李姐帮老王保管账本，知道内情但沉默。", "type": "交叉", "requires": ["c010", "c077", "c121"], "cat": "人物"}, {"id": "c206", "name": "小陈的真实角色", "desc": "综合租房合同+房东信息+身份证+全名：小陈是周建国侄子，被安排当眼线分到10万。", "type": "交叉", "requires": ["c045", "c046", "c079", "c072"], "cat": "人物"}, {"id": "c207", "name": "赵老师被威胁", "desc": "综合举报信+空快递+望远镜方向：赵老师想举报但被周建国威胁监视。", "type": "交叉", "requires": ["c034", "c048", "c080"], "cat": "人物"}, {"id": "c208", "name": "张工双面间谍", "desc": "综合恐吓信+额外收入+摄像头原因：张工同时为两边工作——被收买监视又偷偷保存证据。", "type": "交叉", "requires": ["c047", "c055", "c118"], "cat": "人物"}, {"id": "c209", "name": "录音揭示真相", "desc": "综合录音+偷拍照片+吵架：录音中两人是老王和周建国，讨论如何处理发现真相的赵老师。", "type": "交叉", "requires": ["c029", "c065", "c102"], "cat": "核心"}, {"id": "c210", "name": "30万最终去向", "desc": "综合碎纸凭证+银行流水+三个收款人：30万经恒达洗白后三人平分。", "type": "交叉", "requires": ["c064", "c070", "c071"], "cat": "财务"}, {"id": "c211", "name": "完整案件时间线", "desc": "综合替罪羊+资金链+假合同+去向：周建国策划→拉拢老王→注册空壳→伪造合同→转账→威胁→安排小陈→收买张工→老王跑路。", "type": "交叉", "requires": ["c201", "c202", "c204", "c210"], "cat": "核心"}, {"id": "c212", "name": "李姐两面角色", "desc": "综合私人账本+高档烟酒+短信：李姐是周建国在小区的联络人。", "type": "交叉", "requires": ["c060", "c126", "c077"], "cat": "人物"}, {"id": "c213", "name": "摄像头被调转", "desc": "综合角度偏移+深夜照片+暗号本：小陈帮周建国调转摄像头便于转移物资。", "type": "交叉", "requires": ["c008", "c031", "c058"], "cat": "监控"}, {"id": "c214", "name": "赵老师手中证据", "desc": "综合审计报告+计算草稿+签字被冒用：赵老师有完整审计证据链但被威胁不敢公开。", "type": "交叉", "requires": ["c067", "c019", "c154"], "cat": "财务"}, {"id": "c215", "name": "谁在监视谁", "desc": "综合望远镜+张工摄像头+偷拍：形成互相监视网络——张工监视全小区，刘阿姨监视邻居，周建国监视赵老师。", "type": "交叉", "requires": ["c016", "c017", "c065"], "cat": "监控"}, {"id": "c216", "name": "伪造签字的人", "desc": "综合申请表+签字被冒用+验收报告：模仿赵老师笔迹的是老王。", "type": "交叉", "requires": ["c063", "c154", "c030"], "cat": "财务"}, {"id": "c217", "name": "真正幕后黑手", "desc": "综合陈小军身份+资金链+10万分红+足够证词：周建国是真正策划者，其他人是棋子。", "type": "交叉", "requires": ["c072", "c202", "c149"], "cat": "核心"}, {"id": "c218", "name": "老王跑路真相", "desc": "综合辞职信+电话录音+水电记录：老王被逼跑路当替罪羊。", "type": "交叉", "requires": ["c002", "c051", "c069"], "cat": "人物"}, {"id": "c219", "name": "碎纸机真相", "desc": "综合残骸+碎纸残片+耗材购买：老王销毁证据，碎纸机被周建国的人砸坏。", "type": "交叉", "requires": ["c013", "c014", "c130"], "cat": "物证"}, {"id": "c220", "name": "后门密道", "desc": "综合监控死角+后门钥匙+配钥匙收据：周建国安排配了后门钥匙用于无记录进出。", "type": "交叉", "requires": ["c026", "c035", "c036"], "cat": "物证"}, {"id": "c091", "name": "张工的第二个摄像头", "desc": "阳台侧面还有一个针孔摄像头，对着停车场方向。", "type": "物理", "location": "张工程师家", "day": 3, "cat": "监控"}, {"id": "c092", "name": "李姐店的后门", "desc": "便利店有一个不常用的后门，通向小区内部通道。", "type": "物理", "location": "便利店", "day": 2, "cat": "物证"}, {"id": "c093", "name": "赵老师的日程表", "desc": "每天的时间安排精确到分钟，有强迫症般的规律。", "type": "物理", "location": "赵老师家", "day": 1, "cat": "人物"}, {"id": "c094", "name": "小陈的外卖评价", "desc": "客户评价极好，几乎零差评——这人做事很仔细。", "type": "物理", "location": "小陈住处", "day": 1, "cat": "人物"}, {"id": "c095", "name": "物业保险柜的第二层", "desc": "保险柜下层有一个夹层，需要特殊方法才能打开。", "type": "物理", "location": "物业办公室", "day": 3, "cat": "物证"}, {"id": "c096", "name": "夹层中的U盘", "desc": "保险柜夹层中的U盘存有恒达公司的真实账目。", "type": "物理", "location": "物业办公室", "day": 3, "cat": "财务"}, {"id": "c097", "name": "张工的辞职通知", "desc": "张工桌上有一封写给房东的搬家通知——他准备搬走了。", "type": "物理", "location": "张工程师家", "day": 3, "cat": "人物"}, {"id": "c098", "name": "刘阿姨的通讯录", "desc": "刘阿姨的手机通讯录里有小区所有人的号码，包括老王老婆。", "type": "物理", "location": "刘阿姨家", "day": 2, "cat": "通讯"}, {"id": "c099", "name": "周建国的多次来访记录", "desc": "门禁系统显示周建国用不同临时卡来访过6次。", "type": "物理", "location": "监控室", "day": 3, "cat": "监控"}, {"id": "c100", "name": "维修基金的银行对账单", "desc": "完整的银行对账单显示基金在半年内被分批小额转出过多次。", "type": "物理", "location": "业委会办公室", "day": 3, "cat": "财务"}, {"id": "c166", "name": "刘阿姨知道天台有人", "desc": "刘阿姨：那天晚上天台有两个人在说话，她远远看到但没靠近。", "type": "对话", "npc": "刘阿姨", "day": 2, "cat": "目击"}, {"id": "c167", "name": "李姐和赵老师的关系", "desc": "李姐：赵老师以前帮她算过账，两人关系不错，但最近赵老师不太来了。", "type": "对话", "npc": "李姐", "day": 1, "cat": "人物"}, {"id": "c168", "name": "张工对小陈的看法", "desc": "张工：那个外卖小哥总在我楼下晃悠，不像是在送餐。", "type": "对话", "npc": "张工程师", "day": 2, "cat": "人物"}, {"id": "c169", "name": "赵老师对刘阿姨的看法", "desc": "赵老师：刘阿姨嘴巴不严，天台上那些事她肯定知道不少。", "type": "对话", "npc": "赵老师", "day": 1, "cat": "人物"}, {"id": "c170", "name": "小陈怕赵老师", "desc": "小陈：赵老师看人的眼神很可怕，好像什么都知道。", "type": "对话", "npc": "小陈", "day": 2, "cat": "人物"}, {"id": "c171", "name": "刘阿姨的晨练伙伴证词", "desc": "刘阿姨的晨练伙伴证实案发当晚刘阿姨10点才回到楼下，与她自己说的9点不符。", "type": "对话", "npc": "刘阿姨", "day": 2, "cat": "不在场"}, {"id": "c172", "name": "张工程师的外卖记录", "desc": "张工程师的外卖订单显示案发当晚11点他还在点外卖，但凌晨1点的订单消失了。", "type": "物理", "location": "张工程师家", "day": 2, "cat": "监控"}, {"id": "c173", "name": "李姐丈夫的证词", "desc": "李姐丈夫透露案发前一晚有个陌生男人来店里搬走了好几个箱子。", "type": "对话", "npc": "李姐", "day": 2, "cat": "目击"}, {"id": "c174", "name": "赵老师的药方", "desc": "赵老师桌上大量的安眠药处方——他最近压力大到需要靠药物入睡。", "type": "物理", "location": "赵老师家", "day": 2, "cat": "人物"}, {"id": "c175", "name": "小陈的手机通讯录", "desc": "小陈手机通讯录里有一个备注为'叔'的号码，号码与老王旧手机中无备注号码一致——但不是周建国的。", "type": "物理", "location": "小陈住处", "day": 3, "cat": "通讯"}, {"id": "c176", "name": "物业办公室的指纹报告", "desc": "保险柜上有三个人的指纹：老王、赵老师、还有一个无法比对的——可能戴了手套。", "type": "物理", "location": "物业办公室", "day": 3, "cat": "物证"}, {"id": "c177", "name": "监控室的外来设备痕迹", "desc": "监控主机的USB接口有频繁插拔的磨损痕迹——有人经常用U盘拷贝数据。", "type": "物理", "location": "监控室", "day": 2, "cat": "监控"}, {"id": "c178", "name": "便利店后门的脚印", "desc": "后门通道地面有新鲜的泥土脚印，脚印大小与小陈的鞋码吻合。", "type": "物理", "location": "便利店", "day": 3, "cat": "物证"}, {"id": "c179", "name": "天台的望远镜指纹", "desc": "望远镜上有两组指纹：一组是刘阿姨的，另一组不匹配任何已知NPC——是周建国的？", "type": "物理", "location": "天台", "day": 3, "cat": "物证"}, {"id": "c180", "name": "老王的机票信息", "desc": "老王老婆透露老王买了一张去云南的单程机票，出发日期就是案发后第二天。", "type": "对话", "npc": "刘阿姨", "day": 3, "cat": "人物"}];
var NPCS_DATA={"刘阿姨": {"id": "liuayi", "name": "刘阿姨", "avatar": "👵", "desc": "热心但爱八卦，小区万事通", "dialogue_start": "d_liu_start"}, "张工程师": {"id": "zhanggong", "name": "张工程师", "avatar": "👨‍💻", "desc": "独居熬夜党，阳台上装了摄像头", "dialogue_start": "d_zhang_start"}, "李姐": {"id": "lijie", "name": "李姐", "avatar": "👩", "desc": "小区情报中心，什么都从她店里买过", "dialogue_start": "d_li_start"}, "赵老师": {"id": "zhaolaoshi", "name": "赵老师", "avatar": "👨‍🏫", "desc": "账目专家，对数字极度敏感，有强迫症", "dialogue_start": "d_zhao_start"}, "小陈": {"id": "xiaochen", "name": "小陈", "avatar": "🧑", "desc": "租户，行动轨迹覆盖全小区，但没人注意他", "dialogue_start": "d_chen_start"}};
var DIALOGUES_DATA={"d_liu_start": {"speaker": "刘阿姨", "text": "哎呀，小X啊，来找阿姨有什么事？来来来坐下，阿姨给你倒杯水。最近小区里可不太平啊……", "opts": [{"text": "阿姨好，我想问问维修基金的事", "next": "d_liu_case", "rel": 0}, {"text": "阿姨，您对小区里的人都了解吧？", "next": "d_liu_neighbors", "rel": 2}, {"text": "（拿出水果）阿姨，给您带了点水果", "next": "d_liu_gift", "rel": 10, "gift": "水果"}, {"text": "（严肃地）刘阿姨，有些事您必须告诉我", "next": "d_liu_threat", "rel": -10}]}, "d_liu_case": {"speaker": "刘阿姨", "text": "基金的事啊……阿姨就知道你迟早要问这个。老王这个人，最近确实很反常。以前他每天按时上下班，最近一个月经常深夜还在小区里转悠。而且他老婆好像回娘家了，你说这里面能没事吗？", "opts": [{"text": "您还注意到什么异常吗？", "next": "d_liu_stranger", "rel": 2, "give": "c101"}, {"text": "赵老师和老王之间发生过什么吗？", "next": "d_liu_zhao_fight", "rel": 0}, {"text": "谢谢阿姨，我想再问问别人的事", "next": "d_liu_neighbors", "rel": 0}]}, "d_liu_zhao_fight": {"speaker": "刘阿姨", "text": "哎哟你不知道啊，大概一个月前吧，我路过物业办公室，听到里面吵架声可大了。赵老师冲着老王喊'我要报警'，老王一直在求他'再给我几天时间'。当时我吓了一跳，赶紧走开了。", "opts": [{"text": "他们为什么吵架？", "next": "d_liu_zhao_reason", "rel": 2, "give": "c102"}, {"text": "还有别人知道这件事吗？", "next": "d_liu_others_know", "rel": 0}, {"text": "（记录下来）好的，谢谢阿姨", "next": "d_liu_start", "rel": 1}]}, "d_liu_zhao_reason": {"speaker": "刘阿姨", "text": "具体原因阿姨不太清楚，但听那个意思，好像是账目上出了什么问题。赵老师那个人你也知道，对数字特别敏感，有一点不对他就受不了。不过后来他们好像消停了，赵老师也没报警，也不知道老王跟他说了什么。", "opts": [{"text": "赵老师最近状态怎么样？", "next": "d_liu_zhao_stress", "rel": 0, "give": "c102"}, {"text": "好的，我想问问别的人", "next": "d_liu_neighbors", "rel": 0}]}, "d_liu_neighbors": {"speaker": "刘阿姨", "text": "小区里的事阿姨多少都知道一些。你想问谁？", "opts": [{"text": "张工程师是个什么样的人？", "next": "d_liu_about_zhang", "rel": 0}, {"text": "李姐最近有什么异常吗？", "next": "d_liu_about_lijie", "rel": 0}, {"text": "小陈那个外卖小哥，您了解吗？", "next": "d_liu_about_xiaochen", "rel": 0}, {"text": "赵老师最近怎么样？", "next": "d_liu_zhao_stress", "rel": 0}, {"text": "没什么了，谢谢阿姨", "next": "d_liu_bye", "rel": 0}]}, "d_liu_about_zhang": {"speaker": "刘阿姨", "text": "张工程师啊，这小伙子搬来两年了，平时深居简出的，白天拉着窗帘也不知道在干嘛。不过最近半年他变化挺大的——在阳台上装了摄像头，还经常半夜在小区里走动。阿姨觉得他不只是为了安全那么简单。", "opts": [{"text": "摄像头？拍到什么了吗？", "next": "d_liu_camera_detail", "rel": 2, "give": "c106"}, {"text": "他半夜在小区干什么？", "next": "d_liu_zhang_night", "rel": 0}, {"text": "谢谢，我再去问问别人", "next": "d_liu_start", "rel": 0}]}, "d_liu_camera_detail": {"speaker": "刘阿姨", "text": "案发那天张工特别紧张，第二天就在阳台上捣鼓摄像头。你去找他问问吧，他可能拍到了什么。", "opts": [{"text": "好的，谢谢阿姨", "next": "d_liu_start", "rel": 1}]}, "d_liu_about_lijie": {"speaker": "刘阿姨", "text": "李姐啊，她最近可不太一样。以前她花钱挺节省的，最近突然大手大脚起来——换了新手机，买了新衣服，还说要装修店面。你说她那个小便利店能赚那么多钱吗？", "opts": [{"text": "她有没有可能从别的渠道赚了钱？", "next": "d_liu_lijie_money_detail", "rel": 2, "give": "c105"}, {"text": "她最近和什么人来往密切？", "next": "d_liu_lijie_contacts", "rel": 0}, {"text": "好的，我会注意的", "next": "d_liu_start", "rel": 0}]}, "d_liu_about_xiaochen": {"speaker": "刘阿姨", "text": "小陈啊，那个外卖小哥是半年前搬来的。人倒是挺勤快的，每天在小区里跑来跑去。但阿姨总觉得他有点不对劲——他虽然才来半年，对小区的情况好像特别了解，经常问东问西的。一般人不会这样吧？", "opts": [{"text": "他都问些什么？", "next": "d_liu_xiaochen_questions", "rel": 2, "give": "c103"}, {"text": "他住在哪栋楼？", "next": "d_liu_xiaochen_where", "rel": 0}, {"text": "谢谢阿姨", "next": "d_liu_start", "rel": 0}]}, "d_liu_stranger": {"speaker": "刘阿姨", "text": "对了，案发那天傍晚，我在楼下看到一个戴帽子的陌生人在小区里转悠。天快黑了看不清脸，但那个人走路有点跛——你注意到了吗？", "opts": [{"text": "走路有点跛？您确定吗？", "next": "d_liu_stranger_detail", "rel": 2, "give": "c104"}, {"text": "那个人往哪个方向走了？", "next": "d_liu_stranger_direction", "rel": 0}, {"text": "（记下来）好的谢谢", "next": "d_liu_start", "rel": 1}]}, "d_liu_stranger_detail": {"speaker": "刘阿姨", "text": "确定的！阿姨眼睛虽然老花了，但看人走路还是看得出来的。那个人左脚有点跛，穿深色衣服，还戴了个帽子。后来就往地下车库那个方向去了。", "opts": [{"text": "（联想到监控里的人影……）", "next": "d_liu_start", "rel": 0, "give": "c104"}, {"text": "好的，这是个重要线索", "next": "d_liu_start", "rel": 1}]}, "d_liu_zhao_stress": {"speaker": "刘阿姨", "text": "赵老师最近瘦了很多啊，看着压力很大的样子。经常在楼下转来转去，嘴里还念念有词。前几天我去找他串门，他开门的时候眼神闪烁，好像在隐瞒什么。", "opts": [{"text": "他在隐瞒什么呢？", "next": "d_liu_zhao_secret", "rel": 2, "give": "c152"}, {"text": "好的，谢谢阿姨", "next": "d_liu_start", "rel": 0}]}, "d_liu_gift": {"speaker": "刘阿姨", "text": "哎呀你这孩子，来就来了还带什么东西！阿姨不缺这些。不过你有这份心阿姨很高兴——你是想问什么事吧？阿姨能帮的一定帮。", "opts": [{"text": "阿姨，我想问问小区最近的情况", "next": "d now": {"speaker": "刘阿姨", "text": "这事当时就阿姨一个人路过看到。不过小区里的事嘛，大家多少都有感觉。赵老师最近压力那么大，肯定和这个有关。", "opts": [{"text": "好的，我去问问赵老师", "next": "d_liu_start", "rel": 1}]}, "d_liu_zhang_tense": {"speaker": "刘阿姨", "text": "第二天他脸色可差了，眼睛红红的像一夜没睡。而且他还把窗帘拉得更严实了。", "opts": [{"text": "知道了，我会去找他的", "next": "d_liu_start", "rel": 1}]}, "d_liu_zhang_night": {"speaker": "刘阿姨", "text": "半夜两三点还在小区里走动，谁看了不觉得奇怪？有一次我失眠看到他在监控室门口转悠。", "opts": [{"text": "监控室？他有钥匙吗？", "next": "d_liu_start", "rel": 2, "give": "c151"}]}, "d_liu_lijie_money_detail": {"speaker": "刘阿姨", "text": "谁知道呢。不过她那个便利店，平时卖卖零食饮料能赚多少？突然那么有钱，肯定有别的门路。", "opts": [{"text": "我会去问问她的", "next": "d_liu_start", "rel": 1}]}, "d_liu_lijie_contacts": {"speaker": "刘阿姨", "text": "最近有个开黑色轿车的人来过好几次，和李姐在店门口说话。那个人挺胖的，戴墨镜，走路还有点跛。", "opts": [{"text": "（又是走路跛的人……）", "next": "d_liu_start", "rel": 2, "give": "c104"}]}, "d_liu_xiaochen_questions": {"speaker": "刘阿姨", "text": "问谁住哪栋啊、谁家几口人啊、物业什么时候有人啊、监控室在哪啊……你说一个送外卖的问这些干嘛？", "opts": [{"text": "确实可疑……", "next": "d_liu_start", "rel": 2, "give": "c103"}]}, "d_liu_xiaochen_where": {"speaker": "刘阿姨", "text": "住在9栋301，那房子便宜得很，月租才800。也不知道房东是谁，这么便宜租给他。", "opts": [{"text": "好的谢谢", "next": "d_liu_start", "rel": 1}]}, "d_liu_stranger_direction": {"speaker": "刘阿姨", "text": "往地下车库方向走了。当时天快黑了，阿姨也不敢跟过去。", "opts": [{"text": "好的，这个线索很重要", "next": "d_liu_start", "rel": 1}]}, "d_liu_zhao_secret": {"speaker": "刘阿姨", "text": "阿姨猜他肯定发现了什么大事。你想啊，一个退休会计师，整天在家算啊算的，不是在查账是在干嘛？但具体查出了什么，他不肯跟阿姨说。", "opts": [{"text": "谢谢阿姨", "next": "d_liu_start", "rel": 1}]}, "d_liu_red_guess": {"speaker": "刘阿姨", "text": "阿姨猜……可能是老王？或者是和老王有关的人？反正阿姨没做什么亏心事，收了就收了。", "opts": [{"text": "好的，我会继续调查的", "next": "d_liu_start", "rel": 1}]}, "d_liu_recording_what": {"speaker": "刘阿姨", "text": "他们说什么'事情办好了''钱已经转出去了'，还说'不要让赵老师知道'。阿姨当时吓坏了，赶紧关了录音。", "opts": [{"text": "这太关键了！", "next": "d_liu_start", "rel": 5, "give": "c029"}]}, "d_liu_why_silent": {"speaker": "刘阿姨", "text": "（叹气）阿姨害怕啊。万一是坏人呢？万一报复阿姨呢？但看你这么认真调查，阿姨觉得应该告诉你。", "opts": [{"text": "理解，谢谢阿姨的勇气", "next": "d_liu_start", "rel": 3}]}, "d_liu_transport_detail": {"speaker": "刘阿姨", "text": "箱子不大，像是文件箱。那个人推着小推车从楼里出来，往地下车库去了。大概来回搬了两三趟。", "opts": [{"text": "这个时间……是案发当晚吗？", "next": "d_liu_start", "rel": 2, "give": "c161"}]}, "d_liu_roof_people": {"speaker": "刘阿姨", "text": "有天晚上阿姨在楼下乘凉，看到天台上有两个人影在说话。远远的看不清是谁，但感觉气氛很紧张。", "opts": [{"text": "还记得是哪天吗？", "next": "d_liu_start", "rel": 2, "give": "c166"}]}, "d_zhang_start": {"speaker": "张工程师", "text": "（摘下耳机）哦，是你啊。坐吧，我这里有点乱。有什么事？", "opts": [{"text": "张工，你的摄像头拍到了什么？", "next": "d_zhang_camera", "rel": 0}, {"text": "（递上咖啡）给你带了杯咖啡", "next": "d_zhang_gift", "rel": 10, "gift": "咖啡"}, {"text": "（直视他）监控室的录像，是你删的吧？", "next": "d_zhang_confront", "rel": -15}]}, "d_zhang_camera": {"speaker": "张工程师", "text": "你已经知道了？……好吧，我的阳台摄像头确实在案发当晚拍到了一些东西。凌晨11点左右，有一个人影从物业办公室方向走向地下车库。戴着帽子，看不清脸。", "opts": [{"text": "能把截图给我看看吗？", "next": "d_zhang_screenshot", "rel": 2, "give": "c111"}, {"text": "你还有别的摄像头吗？", "next": "d_zhang_other_camera", "rel": 0}, {"text": "你为什么在阳台装摄像头？", "next": "d_zhang_why_camera", "rel": 0}]}, "d_zhang_screenshot": {"speaker": "张工程师", "text": "（打开电脑）这是我导出的截图，画质不太好但能看到轮廓。你看，这个人走路的姿势——像是在刻意躲避什么。", "opts": [{"text": "谢谢你，这是重要的物证", "next": "d_zhang_start", "rel": 5, "give": "c017"}, {"text": "监控室的录像被删了，你知道怎么回事吗？", "next": "d_zhang_deleted", "rel": 0}]}, "d_zhang_deleted": {"speaker": "张工程师", "text": "（表情微变）我……我试着恢复过，但只找回了一部分。删除是通过网络远程操作的，IP地址显示来自小区内部的WiFi。这说明是小区里的人干的。", "opts": [{"text": "你知道是谁干的吗？", "next": "d_zhang_deny_know", "rel": 0, "give": "c112"}, {"text": "你自己频繁进出监控室，怎么解释？", "next": "d_zhang_monitor_visits", "rel": -5}]}, "d_zhang_deny_know": {"speaker": "张工程师", "text": "（眼神闪烁）我……不知道。可能是任何人。", "opts": [{"text": "（他的表情说明他在说谎）", "next": "d_zhang_press", "rel": 0, "give": "c119", "requires": ["c049", "c075"]}, {"text": "好吧，如果你想到了什么告诉我", "next": "d_zhang_start", "rel": 0}]}, "d_zhang_press": {"speaker": "张工程师", "text": "（沉默很久）……你已经查到了对吧。门禁记录显示我进过监控室。是的，我进去过。但我不是去删录像的——我是去检查设备安全漏洞的。", "opts": [{"text": "你确定不是去删录像的？", "next": "d_zhang_more_press", "rel": -5, "requires": ["c049"]}, {"text": "好吧，我暂时相信你", "next": "d_zhang_start", "rel": 0}]}, "d_zhang_more_press": {"speaker": "张工程师", "text": "（低头）……好吧，有些事我现在不能说。但我向你保证，我保存了证据。如果我出了什么事，那些证据会自动发到网上。你就知道这些就够了。", "opts": [{"text": "你受到了威胁？", "next": "d_zhang_threatened", "rel": 3, "give": "c114"}, {"text": "你到底站在哪一边？", "next": "d_zhang_which_side", "rel": 0}]}, "d_zhang_threatened": {"speaker": "张工程师", "text": "（拿出恐吓信）你看这个——'别多管闲事，删掉录像，否则后果自负。'是前两天塞到我信箱里的。我没当回事，但我开始做更多的备份。", "opts": [{"text": "这封信很重要，能给我吗？", "next": "d_zhang_start", "rel": 5, "give": "c047"}, {"text": "你为什么要冒这个险？", "next": "d_zhang_why_risk", "rel": 3}]}, "d_zhang_why_risk": {"speaker": "张工程师", "text": "因为我是个技术人员，我知道什么是对的什么是错的。有人花钱让我'管理'监控系统，我知道这意味着什么。但我不能就这样算了。", "opts": [{"text": "谁花钱让你管理监控？", "next": "d_zhang_employer", "rel": 0, "give": "c115", "requires": ["c055"]}, {"text": "你做的是对的", "next": "d_zhang_start", "rel": 5}]}, "d_zhang_employer": {"speaker": "张工程师", "text": "（犹豫很久）每月5000元……是通过一个中间人给的，让我按需删除特定时段的录像。我一开始不知道是为什么，后来才发现和维修基金的事有关。", "opts": [{"text": "中间人是谁？", "next": "d_zhang_middleman", "rel": 5, "give": "c115"}, {"text": "你录了备份对吧？", "next": "d_zhang_backup", "rel": 3}]}, "d_zhang_backup": {"speaker": "张工程师", "text": "当然。我每删除一段录像，都会在加密硬盘里保存一份备份。那个硬盘加了密，设置了自动发送——如果我三天不登录，证据会自动发到多个邮箱。", "opts": [{"text": "你考虑过主动交出来吗？", "next": "d_zhang_hand_over", "rel": 5, "give": "c116"}]}, "d_zhang_hand_over": {"speaker": "张工程师", "text": "我在考虑。但你知道，一旦交出来，我也脱不了干系——毕竟我也参与了删除。我在等一个合适的时机。", "opts": [{"text": "现在就是合适的时机", "next": "d_zhang_start", "rel": 5}]}, "d_zhang_confront": {"speaker": "张工程师", "text": "（脸色一变）你怎么……你有什么证据？", "opts": [{"text": "门禁记录显示你案发当晚进了监控室", "next": "d_zhang_admit", "rel": -5, "requires": ["c049"]}, {"text": "我猜的", "next": "d_zhang_deny_hard", "rel": -10}]}, "d_zhang_admit": {"speaker": "张工程师", "text": "（长叹一口气）……你查到了。是的，案发当晚凌晨1点，我接到了一个电话让我去监控室删除特定时段的录像。我犹豫了但还是照做了——不过我偷偷保留了一份加密备份。", "opts": [{"text": "谁打的电话？", "next": "d_zhang_caller", "rel": 5, "give": "c155"}, {"text": "备份在哪？", "next": "d_zhang_backup", "rel": 3}]}, "d_zhang_gift": {"speaker": "张工程师", "text": "（有些意外）谢谢……你还挺细心的。说吧，你想问什么？我能帮的尽量帮。", "opts": [{"text": "你的摄像头拍到了什么？", "next": "d_zhang_camera", "rel": 5}, {"text": "监控室的录像是怎么回事？", "next": "d_zhang_deleted", "rel": 5}]}, "d_zhang_which_side": {"speaker": "张工程师", "text": "（苦笑）说实话？两边都不是。我被卷进来了，现在只想自保。但我保存的那些证据，总有一天会派上用场。", "opts": [{"text": "现在就派上用场了", "next": "d_zhang_start", "rel": 3}]}, "d_zhang_other_camera": {"speaker": "张工程师", "text": "（犹豫）……还有一个，针孔的，对着停车场方向。别用那种眼神看我，我是为了记录进出车辆。", "opts": [{"text": "拍到了什么？", "next": "d_zhang_start", "rel": 0, "give": "c091"}]}, "d_zhang_why_camera": {"speaker": "张工程师", "text": "名义上是防盗。但实际上……有人让我这么做。具体我现在不能说。", "opts": [{"text": "（记录下来）好吧", "next": "d_zhang_start", "rel": 0, "give": "c118"}]}, "d_zhang_monitor_visits": {"speaker": "张工程师", "text": "我……我去检查安全漏洞。你知道那个监控系统有多不安全吗？任何会编程的人都能黑进去。", "opts": [{"text": "你确定只是检查漏洞？", "next": "d_zhang_press", "rel": -5, "give": "c113"}]}, "d_zhang_deny_hard": {"speaker": "张工程师", "text": "你别瞎猜！我什么都没做！", "opts": [{"text": "好吧，对不起", "next": "d_zhang_start", "rel": 0}]}, "d_zhang_middleman": {"speaker": "张工程师", "text": "一个叫……算了，我不确定他的真名。但最近我在网络抓包时发现小区里有人在用加密通讯，IP指向物业办公室。那些人不想让人知道他们在做什么。", "opts": [{"text": "加密通讯？你还发现了什么？", "next": "d_zhang_start", "rel": 3, "give": "c117"}]}, "d_zhang_caller": {"speaker": "张工程师", "text": "电话号码是未知的，可能是临时号码。但声音……听起来像是一个中年男人，说话很有条理，不像是临时起意。", "opts": [{"text": "好的，谢谢你告诉我这些", "next": "d_zhang_start", "rel": 5}]}, "d_zhang_bye": {"speaker": "张工程师", "text": "好的，有什么新发现再来找我。我会继续整理手里的证据。注意安全。", "opts": [{"text": "你也是，保重", "next": "__exit__", "rel": 0}]}, "d_li_start": {"speaker": "李姐", "text": "来了啊？要买点什么还是……有什么事？最近店里忙得很。", "opts": [{"text": "李姐，想跟你聊聊最近的事", "next": "d_li_talk", "rel": 0}, {"text": "（递上高档茶叶）李姐，给您带了点好茶", "next": "d_li_gift", "rel": 12, "gift": "高档茶叶"}, {"text": "（把账本照片拍在桌上）这些东西你认识吧？", "next": "d_li_confront", "rel": -15}]}, "d_li_talk": {"speaker": "李姐", "text": "聊什么？阿姨什么都不知道。你要买东西就买，不买就……算了，你想问什么就问吧。", "opts": [{"text": "老王在你这买过什么特别的东西吗？", "next": "d_li_shredder", "rel": 0}, {"text": "最近有什么陌生人来过小区吗？", "next": "d_li_stranger_car", "rel": 2}, {"text": "小陈经常来你店里吧？", "next": "d_li_xiaochen", "rel": 0}, {"text": "赵老师最近常来买东西吗？", "next": "d_li_zhao_buy", "rel": 0}]}, "d_li_shredder": {"speaker": "李姐", "text": "碎纸机？对，他买过一台。大概三个月前吧，说是办公室用的。还买了不少耗材。后来又有个年轻人也来买了很多耗材——也不知道是不是同一个人指使的。", "opts": [{"text": "那个年轻人是谁？", "next": "d_li_young_buyer", "rel": 3, "give": "c121"}, {"text": "老王还买过别的吗？", "next": "d_li_other_buy", "rel": 0}]}, "d_li_young_buyer": {"speaker": "李姐", "text": "不认识，挺年轻的一个小伙子，戴着外卖头盔。买了一大堆碎纸机耗材和文件袋。我当时还觉得奇怪——一个外卖小哥买这些干嘛？", "opts": [{"text": "（是小陈吗？）好的谢谢李姐", "next": "d_li_start", "rel": 2, "give": "c130"}]}, "d_li_other_buy": {"speaker": "李姐", "text": "还买了U盘、文件袋什么的。对了，案发前一天还买了大量东西——你看，小票我还留着呢。", "opts": [{"text": "能给我看看小票吗？", "next": "d_li_start", "rel": 3, "give": "c009"}]}, "d_li_stranger_car": {"speaker": "李姐", "text": "有一个！案发前一周吧，有个开黑色轿车的人来找老王。那人挺胖的，戴墨镜，走路还有点跛。他们在店门口谈了好一阵子，看起来很熟的样子。", "opts": [{"text": "你还记得那辆车的特征吗？", "next": "d_li_car_detail", "rel": 2, "give": "c123"}, {"text": "那个人后来还来过吗？", "next": "d_li_zhou_again", "rel": 0}]}, "d_li_car_detail": {"speaker": "李姐", "text": "黑色轿车，挺新的，车牌……好像是什么88开头的。那个人老板派头十足，一看就不简单。", "opts": [{"text": "（记录下来）谢谢李姐", "next": "d_li_start", "rel": 2, "give": "c056"}]}, "d_li_zhou_again": {"speaker": "李姐", "text": "后来又来过几次。有一次还进店里买了东西，给了我一张名片——但我找不到了。", "opts": [{"text": "（她可能在说谎）", "next": "d_li_start", "rel": 0}]}, "d_li_xiaochen": {"speaker": "李姐", "text": "小陈啊，每天都来买水。但他不只是买水，每次都要东问西问的——谁来过啊、最近有什么新闻啊。好奇心特别重。有一次他还问监控室在哪儿，你说一个送外卖的问这个干嘛？", "opts": [{"text": "他确实挺可疑的", "next": "d_li_start", "rel": 2, "give": "c125"}, {"text": "他有没有在店里藏过什么东西？", "next": "d_li_hide_things", "rel": 0}]}, "d_li_hide_things": {"speaker": "李姐", "text": "（紧张）藏东西？没有没有！我这店就这么大，能藏什么？", "opts": [{"text": "（她明显在紧张，但没有证据不能追问）", "next": "d_li_start", "rel": 0, "give": "c122"}, {"text": "李姐，我找到了一些东西……你最好老实说", "next": "d_li_admit_package", "rel": -5, "requires": ["c010"]}]}, "d_li_admit_package": {"speaker": "李姐", "text": "（叹气）好吧……是老王让我保管的。他说是'重要文件'，让我放好别让人看到。我就放在仓库最里面了。我真不知道里面是什么！", "opts": [{"text": "里面是两本账本——一真一假", "next": "d_li_accounts", "rel": 3, "give": "c157"}, {"text": "你为什么帮他藏？", "next": "d_li_why_help", "rel": 0}]}, "d_li_why_help": {"speaker": "李姐", "text": "（低头）他给了我钱。还有……那个周总也给过我钱，让我帮忙代购烟酒、传东西。我就是个开小店的，哪见过那么多钱……", "opts": [{"text": "周总就是周建国？", "next": "d_li_admit_zhou", "rel": 5, "give": "c162"}]}, "d_li_admit_zhou": {"speaker": "李姐", "text": "（点头）对，周建国。他经常来买东西，后来就让我帮忙。那些高档烟酒都是帮他代购的，他用来打点关系。我知道这不简单，但已经陷进去了……", "opts": [{"text": "你还有什么是瞒着我的？", "next": "d_li_more_secrets", "rel": 3, "give": "c162"}]}, "d_li_more_secrets": {"speaker": "李姐", "text": "（犹豫很久）我店里的针孔摄像头……是他让我装的。说是'防盗'，但我知道不是。他要看谁进出小区。我手机上还有他发的短信——让我'保管好东西，别让人看到'。", "opts": [{"text": "把短信给我看看", "next": "d_li_start", "rel": 5, "give": "c077"}]}, "d_li_zhao_buy": {"speaker": "李姐", "text": "赵老师最近常来买计算器电池和打印纸，像在算什么大工程。他以前帮过我算账，关系还不错，但最近他不太来了，好像在躲着什么人。", "opts": [{"text": "他和老王关系怎么样？", "next": "d_li_start", "rel": 2, "give": "c124"}]}, "d_li_gift": {"speaker": "李姐", "text": "（眼前一亮）哎呀这茶不便宜吧？你这孩子真客气。来来来，坐，想问什么阿姨尽量告诉你。", "opts": [{"text": "李姐，老王最近在你这买过什么？", "next": "d_li_shredder", "rel": 5}, {"text": "最近有什么可疑的人来过吗？", "next": "d_li_stranger_car", "rel": 5}]}, "d_li_confront": {"speaker": "李姐", "text": "（脸色煞白）你……你从哪里……（深呼吸）好，你想知道什么？", "opts": [{"text": "仓库里的账本是怎么回事？", "next": "d_li_admit_package", "rel": 0}, {"text": "你和周建国什么关系？", "next": "d_li_admit_zhou", "rel": 0}]}, "d_li_accounts": {"speaker": "李姐", "text": "真的假的……我就说不对劲。老王让我保管的时候特别紧张，说'万一出了事，这两本东西能救命'。我真没想到是这种事……", "opts": [{"text": "你保留了这些证据，这很重要", "next": "d_li_start", "rel": 5}]}, "d_li_bye": {"speaker": "李姐", "text": "行吧，有需要再来。对了，最近生意不好做，你要是需要什么日用品可以来找我打折。", "opts": [{"text": "谢谢李姐，再见", "next": "__exit__", "rel": 0}]}, "d_zhao_start": {"speaker": "赵老师", "text": "（推了推眼镜）请进。桌上东西有点多，别碰乱了。你是来问基金的事吧？", "opts": [{"text": "赵老师，您发现账目有什么问题？", "next": "d_zhao_issues", "rel": 0}, {"text": "（递上好茶）赵老师，给您带了点茶叶", "next": "d_zhao_gift", "rel": 10, "gift": "好茶"}, {"text": "赵老师，有些事您必须说清楚", "next": "d_zhao_pressure", "rel": -8}]}, "d_zhao_issues": {"speaker": "赵老师", "text": "问题大了。维修基金的账目有明显的造假痕迹。我查了每一笔收支，发现至少30万被挪用，流向了一个叫'恒达建筑工程公司'的空壳公司。注册资金才10万，法人叫周建国。", "opts": [{"text": "恒达公司和老王有什么关系？", "next": "d_zhao_hengda", "rel": 3, "give": "c131"}, {"text": "您是什么时候发现的？", "next": "d_zhao_when_found", "rel": 0}]}, "d_zhao_when_found": {"speaker": "赵老师", "text": "大概两个月前开始怀疑，一个月前确认。我去找老王对质，他就开始躲着我。后来我们大吵了一架。", "opts": [{"text": "吵架的内容是什么？", "next": "d_zhao_fight", "rel": 2, "give": "c132"}]}, "d_zhao_fight": {"speaker": "赵老师", "text": "我告诉他我已经掌握了证据，要报警。他求我给他几天时间说能解决。我说不可能——然后他威胁我。", "opts": [{"text": "他怎么威胁你的？", "next": "d_zhao_threatened", "rel": 3, "give": "c132"}, {"text": "后来您为什么没报警？", "next": "d_zhao_why_not_report", "rel": 0}]}, "d_zhao_threatened": {"speaker": "赵老师", "text": "（压低声音）他说如果我报警，'有人会来找我'。后来我收到了恒达公司寄来的空快递盒——这就是警告。天台上还有人用望远镜监视我家。我……我害怕了。", "opts": [{"text": "您写了举报信但没寄出？", "next": "d_zhao_report_letter", "rel": 3, "give": "c135", "requires": ["c034"]}, {"text": "您手上有完整的证据吗？", "next": "d_zhao_evidence", "rel": 0}]}, "d_zhao_report_letter": {"speaker": "赵老师", "text": "（惊讶）你怎么知道……好吧，是的，我写了举报信但不敢寄。因为有人在监视我。但证据我都留着——手写的审计报告、计算草稿，还有账目对比。都在安全的地方。", "opts": [{"text": "能让我看看证据吗？", "next": "d_zhao_show_evidence", "rel": 5, "give": "c135"}]}, "d_zhao_show_evidence": {"speaker": "赵老师", "text": "（打开保险柜）你看——完整的审计证据链。每一笔异常我都记录在案。对了，有两份审计报告上的签字不是我签的——有人模仿了我的笔迹。", "opts": [{"text": "谁模仿了您的笔迹？", "next": "d_zhao_forgery", "rel": 5, "give": "c154"}]}, "d_zhao_forgery": {"speaker": "赵老师", "text": "我猜是老王。他作为物业经理有权限接触这些文件，而且他见过我的签字很多次。那两份伪造的审计报告，是为了让虚假的工程看起来合法。", "opts": [{"text": "这是关键证据", "next": "d_zhao_start", "rel": 5, "give": "c154"}]}, "d_zhao_evidence": {"speaker": "赵老师", "text": "当然有。审计报告、计算草稿、账目对比……我做了三十年会计，这些基本功还是有的。30万减去1250元是实际到账金额——那个1250的差额说明中间有人截留。", "opts": [{"text": "1250元的差额？这很有意思", "next": "d_zhao_start", "rel": 3, "give": "c136"}]}, "d_zhao_why_not_report": {"speaker": "赵老师", "text": "（叹气）因为我被威胁了。而且……说实话，我也怕牵连自己。毕竟审计报告上有我的签字——虽然有两份是被伪造的，但谁能证明？", "opts": [{"text": "我可以帮您证明", "next": "d_zhao_start", "rel": 5}]}, "d_zhao_xiaochen": {"speaker": "赵老师", "text": "那个外卖小哥？我调查过他。他的银行流水显示有大额进出——远不是一个外卖骑手该有的。而且他的户籍地和周建国是同一个县城。", "opts": [{"text": "您觉得他和案件有关？", "next": "d_zhao_start", "rel": 3, "give": "c138"}]}, "d_zhao_watched": {"speaker": "赵老师", "text": "（紧张地看了看窗外）是的，我感觉自己被监视了。家里东西被人翻过。天台上有人用望远镜对着我家窗户。我都不敢开灯到太晚。", "opts": [{"text": "您知道是谁在监视您吗？", "next": "d_zhao_start", "rel": 3, "give": "c139"}]}, "d_zhao_suspect_zhang": {"speaker": "赵老师", "text": "我觉得张工程师不是好人。他频繁进出监控室，半夜还在小区活动。他可能参与了删除监控录像的事。", "opts": [{"text": "您有什么证据吗？", "next": "d_zhao_start", "rel": 2, "give": "c140"}]}, "d_zhao_gift": {"speaker": "赵老师", "text": "（接过来仔细看了看）嗯，不错的好茶。你有心了。坐吧，我知道你要问什么——你想知道基金的事对吧？", "opts": [{"text": "是的，请您详细说说", "next": "d_zhao_issues", "rel": 5}]}, "d_zhao_pressure": {"speaker": "赵老师", "text": "（脸色不好看）你这态度……和老王当初威胁我的时候有什么区别？我告诉你，我一辈子清清白白，有什么说什么，但你态度得好。", "opts": [{"text": "（道歉）对不起赵老师，我太急了", "next": "d_zhao_start", "rel": 3}, {"text": "那您就说吧", "next": "d_zhao_issues", "rel": 0}]}, "d_zhao_bye": {"speaker": "赵老师", "text": "好的，你先忙去。注意安全——这事情比你想的复杂。有什么新发现再来找我。", "opts": [{"text": "谢谢赵老师，再见", "next": "__exit__", "rel": 0}]}, "d_chen_start": {"speaker": "小陈", "text": "（紧张地看了看四周）啊……你好。有什么事吗？我刚送完外卖准备休息。", "opts": [{"text": "小陈，聊聊你在这小区的生活吧", "next": "d_chen_life", "rel": 0}, {"text": "（递上运动饮料）辛苦了，喝点水", "next": "d_chen_gift", "rel": 10, "gift": "运动饮料"}, {"text": "（把证据拍在桌上）陈小军，你还要装到什么时候？", "next": "d_chen_confront", "rel": -20}]}, "d_chen_life": {"speaker": "小陈", "text": "我就是个普通外卖骑手，半年前来这个小区租房住的。每天跑外卖，也没什么特别的。这里房租便宜嘛。", "opts": [{"text": "房租怎么这么便宜？", "next": "d_chen_rent", "rel": 2}, {"text": "你为什么选这个小区？", "next": "d_chen_why_here", "rel": 0}, {"text": "案发那天晚上你在哪？", "next": "d_chen_alibi", "rel": 0}]}, "d_chen_rent": {"speaker": "小陈", "text": "找了个好房东嘛，月租800。市场上这个位置起码要1500。房东人好，不怎么来收租。", "opts": [{"text": "房东是谁？", "next": "d_chen_landlord", "rel": 3, "give": "c145"}]}, "d_chen_landlord": {"speaker": "小陈", "text": "（犹豫）房东……叫周哥。平时都是微信联系，没见过几次面。", "opts": [{"text": "周哥？不会是周建国吧？", "next": "d_chen_deny_zhou", "rel": 0, "requires": ["c046"], "give": "c145"}]}, "d_chen_deny_zhou": {"speaker": "小陈", "text": "（明显紧张）不……不认识什么周建国。就是个普通房东。", "opts": [{"text": "（他在说谎，但没有更多证据）", "next": "d_chen_start", "rel": 0, "give": "c142"}, {"text": "你确定？你的身份证显示你和周建国是同乡", "next": "d_chen_press_hometown", "rel": -5, "requires": ["c079"]}]}, "d_chen_press_hometown": {"speaker": "小陈", "text": "（额头冒汗）那……那又怎样？同一个县城那么多人，不代表认识啊。", "opts": [{"text": "好吧，我再问问别的", "next": "d_chen_start", "rel": 0}, {"text": "你外卖箱里的名片怎么解释？", "next": "d_chen_card_press", "rel": -5, "requires": ["c022"]}]}, "d_chen_card_press": {"speaker": "小陈", "text": "（更加紧张）那……那是朋友给的。就是偶然认识的。你别想多了。", "opts": [{"text": "什么样的朋友？", "next": "d_chen_friend", "rel": 3, "give": "c144"}]}, "d_chen_friend": {"speaker": "小陈", "text": "就是一个……之前送外卖认识的。他给了我一张名片说有什么事可以找他。我也没当回事。", "opts": [{"text": "（他还在隐瞒）好的", "next": "d_chen_start", "rel": 0}]}, "d_chen_alibi": {"speaker": "小陈", "text": "那天晚上我在送外卖啊，跑到很晚才回来。你可以查我的外卖记录。", "opts": [{"text": "（但GPS记录显示你的路线很异常……）", "next": "d_chen_gps", "rel": 0, "requires": ["c068"], "give": "c143"}]}, "d_chen_gps": {"speaker": "小陈", "text": "（脸色一变）你……你怎么有我的GPS记录？那……那天晚上我确实去了几个不常去的地方，但那是……是因为接了几个特殊的单。", "opts": [{"text": "什么特殊的单需要去物业办公室？", "next": "d_chen_press_gps", "rel": -5}]}, "d_chen_press_gps": {"speaker": "小陈", "text": "（沉默很久）……我不能说。你别问了。", "opts": [{"text": "小陈，你现在坦白还来得及", "next": "d_chen_start", "rel": 0}, {"text": "你床下的现金是怎么回事？", "next": "d_chen_cash", "rel": -5, "requires": ["c086"]}]}, "d_chen_cash": {"speaker": "小陈", "text": "那是……那是我送外卖攒的！一年多攒下来的。", "opts": [{"text": "一年多攒3万？你一个月挣多少？", "next": "d_chen_cash_press", "rel": 0, "give": "c159"}]}, "d_chen_cash_press": {"speaker": "小陈", "text": "（崩溃边缘）我……好吧。那不全是送外卖赚的。但具体的事我不能说，你再逼我也没用。", "opts": [{"text": "好吧，我不逼你。但你需要帮忙的时候来找我", "next": "d_chen_start", "rel": 5}, {"text": "你暗号本里的东西是什么？", "next": "d_chen_code", "rel": -3, "requires": ["c058"]}]}, "d_chen_code": {"speaker": "小陈", "text": "那个……那是以前玩密室逃脱记的笔记。就是一些解谜用的密码。", "opts": [{"text": "（他又在说谎）你确定？", "next": "d_chen_start", "rel": 0, "give": "c147"}]}, "d_chen_why_here": {"speaker": "小陈", "text": "朋友介绍的嘛，说这里外卖需求大，房租又便宜。我就来了。小区挺好的，人都挺客气。", "opts": [{"text": "什么朋友介绍的？", "next": "d_chen_friend", "rel": 2}]}, "d_chen_gift": {"speaker": "小陈", "text": "（有些意外）谢谢啊……你还挺好的。说吧，你想知道什么？我能说的尽量说。", "opts": [{"text": "案发那天晚上你去了哪里？", "next": "d_chen_alibi", "rel": 5}, {"text": "你认识周建国吗？", "next": "d_chen_deny_zhou", "rel": 5}]}, "d_chen_confront": {"speaker": "小陈", "text": "（脸色惨白，后退一步）你……你怎么知道我的名字？！你……你到底是谁？", "opts": [{"text": "我是业委会的。你身份证上的名字是陈小军", "next": "d_chen_breakdown", "rel": -10, "requires": ["c072"]}, {"text": "放松，我只是来了解情况的", "next": "d_chen_start", "rel": 0}]}, "d_chen_breakdown": {"speaker": "小陈", "text": "（坐倒在椅子上，双手抱头）好吧……好吧。你都知道了。你想怎样？", "opts": [{"text": "告诉我真相。全部的真相", "next": "d_chen_truth", "rel": 5, "give": "c148"}]}, "d_chen_truth": {"speaker": "小陈", "text": "（深呼吸）周建国是我叔叔——我妈的弟弟。他安排我来这个小区住着，平时跑外卖当掩护，实际上是盯着小区的动静。他说就是帮忙看场子，不会有什么大事。", "opts": [{"text": "然后呢？", "next": "d_chen_truth2", "rel": 5, "give": "c148"}]}, "d_chen_truth2": {"speaker": "小陈", "text": "后来他让我帮忙做一些事——调转摄像头角度、通过后门运东西、传话。案发那天晚上我帮他把几个箱子从物业办公室运到了地下车库再从后门出去。我不知道里面是什么。", "opts": [{"text": "你分到了多少钱？", "next": "d_chen_money", "rel": 3, "give": "c149"}]}, "d_chen_money": {"speaker": "小陈", "text": "（低头）10万。对我来说是巨款。但我不敢花，只留了3万在身边，剩下的都转给了老家的妈妈。我每天晚上都睡不好觉。", "opts": [{"text": "钱是30万赃款的一部分", "next": "d_chen_truth3", "rel": 3, "give": "c149"}]}, "d_chen_truth3": {"speaker": "小陈", "text": "我知道……我现在都知道了。30万分三份——叔叔10万，老王10万，我10万。但真正策划的只有叔叔和老王。我就是个跑腿的……我好后悔。", "opts": [{"text": "张工程师和李姐呢？他们参与了吗？", "next": "d_chen_truth_final", "rel": 5, "give": "c150"}]}, "d_chen_truth_final": {"speaker": "小陈", "text": "张工程师被叔叔收买了，负责删监控。李姐帮忙藏东西、代购烟酒。赵老师发现了真相所以叔叔威胁他。老王是执行者，叔叔是策划者。我只是……传话和观察的。对不起。", "opts": [{"text": "谢谢你告诉我真相。现在去自首吧", "next": "d_chen_end", "rel": 10, "give": "c150"}]}, "d_chen_end": {"speaker": "小陈", "text": "（红着眼眶）好。 var ENDINGS_DATA=[{"id": "end_perfect", "name": "完美破案", "condition": {"accuse": "周建国", "evidence_min": 15, "key_clues": ["c211", "c217", "c150"]}, "title": "🏆 完美破案", "text": "你成功揭露了整个阴谋的全貌！周建国作为幕后主谋被逮捕，老王在外地被找到并配合调查，小陈主动自首并提供了关键证词。30万维修基金被追回，张工程师因配合调查获得从轻处理，李姐和赵老师也都各自承担了相应的责任。阳光花园小区恢复了往日的平静，而你作为新任业委会成员，赢得了所有业主的信任和尊重。"}, {"id": "end_good_mastermind", "name": "揪出幕后黑手", "condition": {"accuse": "周建国", "evidence_min": 10, "key_clues": ["c217"]}, "title": "✅ 真相大白", "text": "你指认了周建国为幕后主谋，虽然证据链不够完整，但足以让警方立案调查。经过深入侦查，周建国最终被绳之以法。30万基金大部分被追回。你的推理能力得到了大家的认可。"}, {"id": "end_good_scapegoat", "name": "替老王翻案", "condition": {"accuse": "老王", "evidence_min": 10, "key_clues": ["c201", "c218"]}, "title": "✅ 还老王清白", "text": "虽然你指认了老王，但你同时提供了他被胁迫的证据。警方最终认定老王是从犯而非主谋，真正的幕后黑手周建国也被追查归案。老王被判了缓刑，开始了新的生活。"}, {"id": "end_partial_zhang", "name": "技术宅的正义", "condition": {"accuse": "张工程师", "evidence_min": 8}, "title": "⚠️ 部分真相", "text": "你指认了张工程师，他确实参与了删除监控录像的事，但他不是主谋。张工主动交出了加密硬盘中的证据，帮助揭露了更大的阴谋。最终周建国被追查到，但你的判断不够准确，错过了最佳破案时机。"}, {"id": "end_partial_li", "name": "情报站的代价", "condition": {"accuse": "李姐", "evidence_min": 8}, "title": "⚠️ 部分真相", "text": "你指认了李姐，她确实帮忙藏匿了关键证据。李姐在压力下交出了账本，顺藤摸瓜找到了更多线索。但真正的主谋周建国已经有所防备，案件的侦破变得更加困难。"}, {"id": "end_partial_zhao", "name": "会计的困境", "condition": {"accuse": "赵老师", "evidence_min": 5}, "title": "❌ 误判", "text": "你指认了赵老师——这是个严重的误判。赵老师实际上是整个案件的揭发者，他手中的审计证据是破案的关键。你的指控让他备受打击，也让真正的罪犯有了更多时间销毁证据。"}, {"id": "end_partial_chen", "name": "小鱼落网", "condition": {"accuse": "小陈", "evidence_min": 8}, "title": "⚠️ 部分真相", "text": "你指认了小陈，他确实参与了犯罪。小陈崩溃后坦白了一切，供出了周建国。但因为你的调查方向偏了，周建国提前得到消息开始转移资产。虽然最终被抓获，但30万只追回了一半。"}, {"id": "end_fail_no_evidence", "name": "证据不足", "condition": {"evidence_min": 0, "key_clues_missing": true}, "title": "❌ 指控失败", "text": "你虽然提出了指控，但提供的证据不足以支撑。嫌疑人矢口否认，没有确凿证据让警方无法立案。30万维修基金就这样消失了，小区居民对你失去了信任。案件成为悬案。"}, {"id": "end_fail_wrong", "name": "冤枉好人", "condition": {"accuse": "赵老师", "evidence_min": 0}, "title": "❌ 冤假错案", "text": "你指控了赵老师，但没有任何可靠证据。赵老师愤怒地拿出了自己调查的证据证明清白，反而暴露了你调查不力的事实。真正的罪犯趁机逃脱，小区居民对你的能力深感怀疑。"}, {"id": "end_time_up", "name": "时间耗尽", "condition": {"timeout": true}, "title": "⏰ 时间耗尽", "text": "七天时间到了，你没有做出任何指控。虽然你收集了不少线索，但没有在规定时间内得出结论。案件被移交给警方，但因为延误了最佳调查时机，很多证据已经丢失或被销毁。30万基金最终只追回了一小部分。"}, {"id": "end_truth_no_accuse", "name": "知道真相但沉默", "condition": {"no_accuse_but_know": true}, "title": "😶 沉默的真相", "text": "你查明了真相，但最终选择不指控任何人。也许是因为证据不够确凿，也许是因为你对谁都有所同情。你把收集到的线索匿名寄给了警方。三个月后，周建国在另一起案件中被抓获，阳光花园的案子也一并水落石出。但你的沉默让正义迟到了很久。"}];
var S={day:1,actions:3,clues:[],rel:{},srch:{},links:[],done:false};
var NL=['刘阿姨','张工程师','李姐','赵老师','小陈'];
function startGame(){S={day:1,actions:3,clues:[],rel:{'刘阿姨':0,'张工程师':0,'李姐':0,'赵老师':0,'小陈':0},srch:{},links:[],done:false};go('game-screen');render();}
function go(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active');}
function render(){document.getElementById('dayDisp').textContent=S.day;document.getElementById('actDisp').textContent='行动 '+S.actions;document.getElementById('clueCnt').textContent=S.clues.length;var h='';NL.forEach(function(n){var npc=NPCS_DATA[n];var r=S.rel[n]||0;h+='<div class="npc-item" onclick="talk(\''+n+'\')"><span class="avatar">'+npc.avatar+'</span><div><div>'+n+'</div><div style="font-size:.78em;color:#9a9a9a">'+npc.desc+'</div><div style="font-size:.72em;color:#c8a951">好感度: '+r+'</div></div></div>';});document.getElementById('npcList').innerHTML=h;var h2='';LOCATIONS_DATA.forEach(function(l){var k=l.id+'_d'+S.day;var s=S.srch[k]||0;h2+='<div class="loc-item" onclick="inv(\''+l.id+'\')"><span class="icon">'+l.icon+'</span><div><div>'+l.name+'</div><div style="font-size:.78em;color:#9a9a9a">'+(s?'已搜索':'未搜索')+'</div></div></div>';});document.getElementById('locList').innerHTML=h2;}
function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2200);}
function showOv(){document.getElementById('overlay').classList.add('active');}
function hideOv(){document.getElementById('overlay').classList.remove('active');}
function cn(id){var c=CLUES_DATA.find(function(x){return x.id===id});return c?c.name:id;}
function addClue(id){if(!S.clues.includes(id)){S.clues.push(id);toast('获得线索：'+cn(id));checkCross();}}
function checkCross(){CLUES_DATA.forEach(function(c){if(c.type==='交叉'&&c.requires&&!S.clues.includes(c.id)){if(c.requires.every(function(r){return S.clues.includes(r)})){S.clues.push(c.id);toast('发现交叉线索：'+c.name);}}});}
function talk(n){if(S.actions<=0){toast('今天没有行动力了');return;}var npc=NPCS_DATA[n];showDN(n,npc.dialogue_start);}
function showDN(n,nid){if(nid==='__exit__'){S.actions--;render();hideOv();toast('对话结束');return;}var nd=DIALOGUES_DATA[nid];if(!nd){hideOv();return;}var h='<div class="dialogue-speaker">'+nd.speaker+'</div><div class="dialogue-text">'+nd.text+'</div><div class="dialogue-opts">';nd.opts.forEach(function(o,i){var ok=true;if(o.requires){o.requires.forEach(function(r){if(!S.clues.includes(r))ok=false;});}if(o.relReq&&(S.rel[n]||0)<o.relReq)ok=false;if(o.dayReq&&S.day<o.dayReq)ok=false;if(ok)h+='<div class="dialogue-opt" onclick="pickOpt(\''+n+'\','+i+',\''+nid+'\')">'+o.text+'</div>';});h+='</div>';document.getElementById('overlayBox').innerHTML=h;showOv();}
function pickOpt(n,i,nid){var nd=DIALOGUES_DATA[nid];var o=nd.opts[i];if(o.rel){S.rel[n]=(S.rel[n]||0)+o.rel;}if(o.give)addClue(o.give);showDN(n,o.next);}
function inv(loc){if(S.actions<=0){toast('今天没有行动力了');return;}var l=LOCATIONS_DATA.find(function(x){return x.id===loc});var k=loc+'_d'+S.day;if(S.srch[k]){toast('今天已经搜索过了');return;}S.srch[k]=1;S.actions--;var found=[];l.clues.forEach(function(cid){if(S.clues.includes(cid))return;var c=CLUES_DATA.find(function(x){return x.id===cid});if(c&&c.day<=S.day&&Math.random()<0.75){S.clues.push(cid);found.push(c);}});checkCross();var h='<h3>'+l.icon+' '+l.name+'</h3><p style="margin:8px 0">'+l.desc+'</p>';if(found.length){h+='<hr class="sep"><h3 style="color:#4ecdc4">发现线索</h3>';found.forEach(function(c){h+='<div class="clue-card '+c.type+'"><strong>'+c.name+'</strong><p style="font-size:.88em;margin-top:3px">'+c.desc+'</p></div>';});}else{h+='<hr class="sep"><p style="color:#9a9a9a">这次没有新发现。</p>';}document.getElementById('content').innerHTML=h;render();}
function showClues(){var h='<h3>线索背包</h3>';var t={物理:[],对话:[],交叉:[]};S.clues.forEach(function(id){var c=CLUES_DATA.find(function(x){return x.id===id});if(c){if(!t[c.type])t[c.type]=[];t[c.type].push(c);}});['物理','对话','交叉'].forEach(function(tp){if(t[tp]&&t[tp].length){h+='<h4 style="margin:10px 0;color:#c8a951">'+tp+'线索 ('+t[tp].length+')</h4>';t[tp].forEach(function(c){h+='<div class="clue-card '+c.type+'"><strong>'+c.name+'</strong><p style="font-size:.84em;margin-top:3px">'+c.desc+'</p></div>';});}});if(!S.clues.length)h+='<p style="color:#9a9a9a">暂无线索</p>';h+='<br><button class="btn btn-small" onclick="hideOv()">关闭</button>';document.getElementById('overlayBox').innerHTML=h;showOv();}
function showBoard(){var h='<h3>推理板</h3><p style="color:#9a9a9a;margin-bottom:8px">选择两条线索进行关联</p><div class="board-wrap">';S.clues.forEach(function(id,i){var c=CLUES_DATA.find(function(x){return x.id===id});if(c)h+='<div class="board-chip" id="bc'+i+'" onclick="togBC('+i+')">'+c.name+'</div>';});h+='</div><div style="margin-top:12px"><button class="btn btn-small" onclick="tryConn()">关联</button> <button class="btn btn-small btn-outline" onclick="hideOv()">关闭</button></div><div id="connRes" style="margin-top:8px"></div>';document.getElementById('overlayBox').innerHTML=h;window._bs=[];showOv();}
function togBC(i){var el=document.getElementById('bc'+i);if(!el)return;if(window._bs.includes(i)){window._bs=window._bs.filter(function(x){return x!==i});el.classList.remove('sel');}else{if(window._bs.length>=2)return;window._bs.push(i);el.classList.add('sel');}}
function tryConn(){if(window._bs.length<2){toast('选两条线索');return;}var a=S.clues[window._bs[0]],b=S.clues[window._bs[1]];var found=false;CLUES_DATA.forEach(function(c){if(c.type==='交叉'&&c.requires&&!S.clues.includes(c.id)){if(c.requires.includes(a)&&c.requires.includes(b)&&c.requires.every(function(r){return S.clues.includes(r)})){S.clues.push(c.id);document.getElementById('connRes').innerHTML='<div class="clue-card cross new-clue"><strong>发现：'+c.name+'</strong><p>'+c.desc+'</p></div>';found=true;toast('新交叉线索！');}}});if(!found)document.getElementById('connRes').innerHTML='<p style="color:#9a9a9a">无关联，试试其他组合。</p>';}
function makeAccusation(){var suspects=['周建国','老王','张工程师','李姐','赵老师','小陈','无人'];var h='<h3>指认凶手</h3><p style="color:#9a9a9a;margin-bottom:12px">选择你认为的幕后主谋</p>';suspects.forEach(function(s){h+='<div class="accuse-card" id="ac-'+s+'" onclick="selSus(\''+s+'\')">'+(s==='无人'?'不指认任何人':s)+'</div>';});h+='<div style="margin-top:14px"><button class="btn btn-danger" onclick="confirmAccuse()">确认指认</button> <button class="btn btn-outline btn-small" onclick="hideOv()">取消</button></div>';document.getElementById('overlayBox').innerHTML=h;window._sus=null;showOv();}
function selSus(s){document.querySelectorAll('.accuse-card').forEach(function(c){c.classList.remove('selected')});var el=document.getElementById('ac-'+s);if(el)el.classList.add('selected');window._sus=s;}
function confirmAccuse(){if(!window._sus){toast('选一个嫌疑人');return;}var s=window._sus,ec=S.clues.length,kc=['c211','c217','c150','c201','c202'],hk=kc.filter(function(k){return S.clues.includes(k)}),eid='end_fail_no_evidence';
if(s==='周建国'){if(ec>=15&&hk.length>=2)eid='end_perfect';else if(ec>=10&&hk.includes('c217'))eid='end_good_mastermind';else if(ec>=5)eid='end_partial_chen';}
else if(s==='老王'){if(ec>=10&&hk.includes('c201'))eid='end_good_scapegoat';else if(ec>=5)eid='end_partial_chen';}
else if(s==='张工程师'){if(ec>=8)eid='end_partial_zhang';}
else if(s==='李姐'){if(ec>=8)eid='end_partial_li';}
else if(s==='赵老师'){eid='end_fail_wrong';}
else if(s==='小陈'){if(ec>=8)eid='end_partial_chen';}
else if(s==='无人'){eid='end_time_up';}
showEnding(eid);}
function showEnding(eid){var e=ENDINGS_DATA.find(function(x){return x.id===eid});if(!e){toast('结局错误');return;}S.done=true;var h='<div class="ending-title">'+e.title+'</div><div class="ending-text">'+e.text+'</div><p style="margin-top:14px;color:#9a9a9a;text-align:center">收集线索：'+S.clues.length+'</p><div style="text-align:center;margin-top:14px"><button class="btn" onclick="startGame()">重新开始</button></div>';document.getElementById('overlayBox').innerHTML=h;showOv();}
function nextDay(){if(S.day>=7){toast('第七天结束了！必须做出指认！');makeAccusation();return;}S.day++;S.actions=3;toast('第'+S.day+'天开始了');render();}
function saveGame(){localStorage.setItem('cm_save',JSON.stringify(S));toast('已保存');}
function loadGame(){var d=localStorage.getItem('cm_save');if(d){S=JSON.parse(d);go('game-screen');render();toast('已加载');}else{toast('无存档');}}

</script>
